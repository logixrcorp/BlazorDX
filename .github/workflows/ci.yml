name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-unit:
    name: Build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node (esbuild for the TypeScript bridge)
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Add the wasm Rust target (dx_grid)
        run: rustup target add wasm32-unknown-unknown

      - name: Restore TypeScript toolchain
        run: npm ci
        working-directory: src/BlazorDX.Interop.Ts

      - name: Build (warnings are errors)
        run: dotnet build BlazorDX.slnx -c Release

      - name: Rust kernel unit tests (native host)
        run: cargo test --manifest-path src/BlazorDX.Compute.Rust/Cargo.toml

      - name: Speed wasm build smoke (opt-level 3 + simd128)
        run: dotnet build src/BlazorDX.Interop/BlazorDX.Interop.csproj -c Release -p:RustSpeed=true

      - name: Unit tests (bUnit + compute + analyzers + documents/reporting)
        run: |
          dotnet test tests/BlazorDX.Components.Tests/BlazorDX.Components.Tests.csproj -c Release --no-build
          dotnet test tests/BlazorDX.Compute.Tests/BlazorDX.Compute.Tests.csproj -c Release --no-build
          dotnet test tests/BlazorDX.Analyzers.Tests/BlazorDX.Analyzers.Tests.csproj -c Release --no-build
          dotnet test tests/BlazorDX.MockReportServer.Tests/BlazorDX.MockReportServer.Tests.csproj -c Release --no-build
          dotnet test tests/BlazorDX.Integrations.Reporting.Tests/BlazorDX.Integrations.Reporting.Tests.csproj -c Release --no-build
          dotnet test tests/BlazorDX.Integrations.PowerBI.Tests/BlazorDX.Integrations.PowerBI.Tests.csproj -c Release --no-build

  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: build-and-unit
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node (esbuild for the TypeScript bridge)
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Add the wasm Rust target (dx_grid)
        run: rustup target add wasm32-unknown-unknown

      - name: Restore TypeScript toolchain
        run: npm ci
        working-directory: src/BlazorDX.Interop.Ts

      - name: Build
        run: dotnet build BlazorDX.slnx -c Release

      - name: Install Playwright browser (${{ matrix.browser }})
        run: pwsh tests/BlazorDX.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps ${{ matrix.browser }}

      - name: Start the demo server
        run: |
          dotnet run --project samples/BlazorDX.Demo/BlazorDX.Demo/BlazorDX.Demo.csproj -c Release --no-build --urls http://localhost:5296 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5296/ > /dev/null; then echo "server up"; break; fi
            sleep 2
          done

      - name: Run E2E tests
        env:
          BLAZORDX_BASEURL: http://localhost:5296
          BLAZORDX_BROWSER: ${{ matrix.browser }}
        run: dotnet test tests/BlazorDX.E2E.Tests/BlazorDX.E2E.Tests.csproj -c Release --no-build

  # AOT is the headline differentiator and a long (~20 min) compile. It publishes the
  # WHOLE component set AOT-compiled + trimmed, then drives the published app with the
  # E2E suite to prove it actually runs — not just that it compiled.
  #
  # It runs on PRs too (not just main): a WASM-AOT/trim break compiles fine in Debug and
  # in a plain Release build, so without this it would pass the PR and only turn `main`
  # red on merge. Catching it pre-merge is worth the runtime. (To trade merge-safety back
  # for cheaper PRs, restore `if: github.event_name != 'pull_request'`.)
  aot-publish:
    name: AOT publish + smoke
    runs-on: ubuntu-latest
    needs: build-and-unit
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Node (esbuild for the TypeScript bridge)
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Add the wasm Rust target (dx_grid)
        run: rustup target add wasm32-unknown-unknown

      - name: Restore TypeScript toolchain
        run: npm ci
        working-directory: src/BlazorDX.Interop.Ts

      - name: Install the wasm-tools workload (AOT)
        run: dotnet workload install wasm-tools

      - name: Publish AOT + trimmed (warnings are errors)
        run: dotnet publish samples/BlazorDX.Demo/BlazorDX.Demo/BlazorDX.Demo.csproj -c Release -p:EnableAot=true -o publish

      # The smoke run drives the AOT app with the E2E suite, so the test project
      # must be built first — it generates playwright.ps1 and is run with --no-build below.
      - name: Build the E2E test project (provides playwright.ps1)
        run: dotnet build tests/BlazorDX.E2E.Tests/BlazorDX.E2E.Tests.csproj -c Release

      - name: Install Playwright (chromium)
        run: pwsh tests/BlazorDX.E2E.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start the AOT-published app
        run: |
          dotnet publish/BlazorDX.Demo.dll --urls http://localhost:5296 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5296/ > /dev/null; then echo "AOT app up"; break; fi
            sleep 2
          done

      # Prove the AOT-published app actually serves and renders. The home page is
      # static-SSR, so this needs no per-test WASM cold-boot — driving the full
      # interactive suite against the AOT build is too slow/flaky on a 2-core hosted
      # runner (the AOT runtime re-instantiates per test). Interactivity is already
      # covered above by the Chromium/Firefox/WebKit jobs against the JIT build.
      - name: Smoke the AOT build (serves + SSR-renders)
        env:
          BLAZORDX_BASEURL: http://localhost:5296
          BLAZORDX_BROWSER: chromium
        run: dotnet test tests/BlazorDX.E2E.Tests/BlazorDX.E2E.Tests.csproj -c Release --no-build --filter "FullyQualifiedName~SmokeE2ETests.Home_renders_the_hero_and_catalog"
